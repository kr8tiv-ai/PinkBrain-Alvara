services:
  postgres:
    image: postgres:16-alpine
    container_name: pinkbrain-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: pinkbrain
      POSTGRES_USER: pinkbrain
      POSTGRES_PASSWORD: pinkbrain_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pinkbrain -d pinkbrain']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
